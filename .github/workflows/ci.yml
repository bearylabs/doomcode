name: CI

on:
    push:
        branches:
            - main
    pull_request:

permissions:
    contents: read

jobs:
    validate:
        name: Compile, lint, and test
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Compile
              run: npm run compile

            - name: Lint
              run: npm run lint

            - name: Test (headless)
              run: xvfb-run -a npm test
